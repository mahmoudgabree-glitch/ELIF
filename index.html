<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELIF Perfumes | Fine Fragrances</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a1a;
            --secondary: #c9a96e;
            --accent: #f5f0e8;
            --light: #faf8f5;
            --dark: #0f0f0f;
            --text: #2d2d2d;
            --text-light: #666;
            --border: #e8e4de;
            --success: #2d6a4f;
            --danger: #c44;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.12);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: var(--text); background: var(--light); line-height: 1.6; }
        h1, h2, h3, h4, .brand { font-family: 'Playfair Display', serif; }

        /* ===== NAVIGATION ===== */
        nav { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid var(--border); transition: all 0.3s ease; }
        nav.scrolled { box-shadow: var(--shadow); }
        .nav-container { max-width: 1400px; margin: 0 auto; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-size: 1.8rem; font-weight: 600; letter-spacing: 3px; color: var(--primary); cursor: pointer; }
        .nav-links { display: flex; gap: 2.5rem; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--text); font-weight: 500; font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase; transition: color 0.3s; position: relative; }
        .nav-links a:hover { color: var(--secondary); }
        .nav-actions { display: flex; gap: 1.5rem; align-items: center; }
        .nav-actions button { background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--primary); position: relative; transition: color 0.3s; }
        .nav-actions button:hover { color: var(--secondary); }
        .cart-count { position: absolute; top: -8px; right: -8px; background: var(--secondary); color: white; font-size: 0.7rem; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; }
        .mobile-menu-btn { display: none; font-size: 1.5rem; background: none; border: none; cursor: pointer; }

        /* ===== HERO ===== */
        .hero { height: 100vh; background: linear-gradient(135deg, var(--dark) 0%, #2a2a2a 100%); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .hero::before { content: ''; position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(201,169,110,0.15) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .hero-content { text-align: center; color: white; z-index: 2; max-width: 800px; padding: 0 2rem; position: relative; }
        .hero-content h1 { font-size: 4rem; font-weight: 400; margin-bottom: 1rem; letter-spacing: 2px; }
        .hero-content p { font-size: 1.2rem; font-weight: 300; margin-bottom: 2.5rem; opacity: 0.8; }
        .hero-btn { display: inline-block; padding: 1rem 3rem; background: var(--secondary); color: white; text-decoration: none; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; transition: all 0.3s; border: 2px solid var(--secondary); cursor: pointer; border: none; font-family: 'Inter', sans-serif; font-size: 1rem; }
        .hero-btn:hover { background: transparent; color: var(--secondary); }
        .scroll-indicator { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); color: white; opacity: 0.5; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); } 40% { transform: translateX(-50%) translateY(-10px); } 60% { transform: translateX(-50%) translateY(-5px); } }

        /* ===== SECTIONS ===== */
        section { padding: 5rem 2rem; max-width: 1400px; margin: 0 auto; }
        .section-header { text-align: center; margin-bottom: 3rem; }
        .section-header h2 { font-size: 2.5rem; margin-bottom: 0.5rem; color: var(--primary); }
        .section-header p { color: var(--text-light); font-size: 1rem; }
        .divider { width: 60px; height: 3px; background: var(--secondary); margin: 1rem auto; }

        /* ===== CATEGORIES ===== */
        .categories { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
        .category-card { position: relative; height: 280px; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.3s; }
        .category-card:hover { transform: translateY(-5px); }
        .category-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .category-card:hover img { transform: scale(1.1); }
        .category-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 60%); display: flex; flex-direction: column; justify-content: flex-end; padding: 1.5rem; color: white; }
        .category-overlay h3 { font-size: 1.5rem; margin-bottom: 0.3rem; }
        .category-overlay span { font-size: 0.85rem; opacity: 0.8; }

        /* ===== FILTERS ===== */
        .filter-section { background: white; padding: 2rem; border-radius: 12px; margin-bottom: 2rem; box-shadow: var(--shadow); }
        .filter-row { display: flex; gap: 2rem; flex-wrap: wrap; align-items: center; }
        .filter-group { flex: 1; min-width: 200px; }
        .filter-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-light); }
        .filter-options { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .filter-chip { padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 25px; background: white; cursor: pointer; font-size: 0.85rem; transition: all 0.3s; font-family: 'Inter', sans-serif; }
        .filter-chip:hover, .filter-chip.active { background: var(--secondary); color: white; border-color: var(--secondary); }
        .search-box { position: relative; flex: 1; min-width: 250px; }
        .search-box input { width: 100%; padding: 0.8rem 1rem 0.8rem 2.5rem; border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem; font-family: 'Inter', sans-serif; transition: border-color 0.3s; }
        .search-box input:focus { outline: none; border-color: var(--secondary); }
        .search-box::before { content: '🔍'; position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); opacity: 0.5; }

        /* ===== PRODUCTS ===== */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .product-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; position: relative; }
        .product-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }
        .product-image { position: relative; height: 320px; overflow: hidden; background: var(--accent); display: flex; align-items: center; justify-content: center; }
        .product-image img { width: 60%; height: auto; transition: transform 0.5s; }
        .product-card:hover .product-image img { transform: scale(1.05); }
        .product-badge { position: absolute; top: 1rem; left: 1rem; padding: 0.4rem 0.8rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .badge-luxury { background: var(--dark); color: var(--secondary); }
        .badge-niche { background: #4a4a4a; color: white; }
        .badge-new { background: var(--secondary); color: white; }
        .product-actions { position: absolute; right: 1rem; top: 1rem; display: flex; flex-direction: column; gap: 0.5rem; opacity: 0; transform: translateX(10px); transition: all 0.3s; }
        .product-card:hover .product-actions { opacity: 1; transform: translateX(0); }
        .product-actions button { width: 36px; height: 36px; border-radius: 50%; border: none; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: all 0.3s; font-size: 1rem; }
        .product-actions button:hover { background: var(--secondary); color: white; }
        .product-info { padding: 1.5rem; }
        .product-category { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--secondary); font-weight: 600; margin-bottom: 0.5rem; }
        .product-name { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--primary); }
        .product-brand { font-size: 0.9rem; color: var(--text-light); margin-bottom: 0.5rem; }
        .product-notes { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .note-tag { font-size: 0.75rem; padding: 0.2rem 0.6rem; background: var(--accent); border-radius: 12px; color: var(--text-light); }
        .product-footer { display: flex; justify-content: space-between; align-items: center; }
        .product-price { font-size: 1.3rem; font-weight: 700; color: var(--primary); }
        .product-price .original { font-size: 0.9rem; text-decoration: line-through; color: var(--text-light); margin-left: 0.5rem; font-weight: 400; }
        .add-to-cart { padding: 0.6rem 1.2rem; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; transition: all 0.3s; font-family: 'Inter', sans-serif; }
        .add-to-cart:hover { background: var(--secondary); }

        /* ===== MODALS ===== */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 2rem; backdrop-filter: blur(5px); }
        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 16px; max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; animation: modalIn 0.3s ease; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-close { position: absolute; top: 1.5rem; right: 1.5rem; width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--light); cursor: pointer; font-size: 1.2rem; z-index: 10; transition: all 0.3s; }
        .modal-close:hover { background: var(--secondary); color: white; }
        .modal-content { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
        .modal-image { background: var(--accent); display: flex; align-items: center; justify-content: center; padding: 3rem; min-height: 500px; }
        .modal-image img { max-width: 70%; height: auto; }
        .modal-details { padding: 3rem; }
        .modal-details h2 { font-size: 2rem; margin-bottom: 0.5rem; }
        .modal-details .brand { font-size: 1.1rem; color: var(--text-light); margin-bottom: 1.5rem; }
        .modal-price { font-size: 1.8rem; font-weight: 700; margin-bottom: 1.5rem; }
        .scent-pyramid { margin: 2rem 0; }
        .scent-pyramid h4 { margin-bottom: 1rem; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; }
        .pyramid-level { margin-bottom: 1rem; }
        .pyramid-label { font-weight: 600; font-size: 0.85rem; color: var(--secondary); margin-bottom: 0.3rem; }
        .pyramid-notes { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .pyramid-notes span { padding: 0.3rem 0.8rem; background: var(--accent); border-radius: 20px; font-size: 0.85rem; }
        .modal-description { margin: 1.5rem 0; color: var(--text-light); line-height: 1.8; }
        .size-selector { margin: 1.5rem 0; }
        .size-selector h4 { margin-bottom: 0.8rem; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .size-options { display: flex; gap: 0.8rem; }
        .size-option { padding: 0.6rem 1.2rem; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.3s; font-weight: 500; }
        .size-option:hover, .size-option.active { border-color: var(--secondary); background: var(--secondary); color: white; }
        .modal-add-cart { width: 100%; padding: 1rem; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-top: 1rem; text-transform: uppercase; letter-spacing: 2px; }
        .modal-add-cart:hover { background: var(--secondary); }

        /* ===== CART ===== */
        .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: none; }
        .cart-overlay.active { display: block; }
        .cart-sidebar { position: fixed; right: 0; top: 0; height: 100vh; width: 100%; max-width: 450px; background: white; z-index: 2001; transform: translateX(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; }
        .cart-overlay.active .cart-sidebar { transform: translateX(0); }
        .cart-header { padding: 1.5rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .cart-header h3 { font-size: 1.3rem; }
        .cart-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text); }
        .cart-items { flex: 1; overflow-y: auto; padding: 1rem 2rem; }
        .cart-item { display: flex; gap: 1rem; padding: 1rem 0; border-bottom: 1px solid var(--border); }
        .cart-item-image { width: 80px; height: 80px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .cart-item-image img { width: 60%; height: auto; }
        .cart-item-details { flex: 1; }
        .cart-item-name { font-weight: 600; margin-bottom: 0.3rem; }
        .cart-item-brand { font-size: 0.85rem; color: var(--text-light); margin-bottom: 0.5rem; }
        .cart-item-price { font-weight: 700; }
        .cart-item-qty { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; }
        .qty-btn { width: 28px; height: 28px; border: 1px solid var(--border); background: white; cursor: pointer; border-radius: 4px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .qty-btn:hover { background: var(--accent); }
        .remove-item { background: none; border: none; color: #c44; cursor: pointer; font-size: 0.85rem; margin-top: 0.5rem; }
        .cart-empty { text-align: center; padding: 3rem 1rem; color: var(--text-light); }
        .cart-empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
        .cart-footer { padding: 1.5rem 2rem; border-top: 1px solid var(--border); background: var(--light); }
        .cart-subtotal { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
        .cart-total { display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: 700; margin: 1rem 0; padding-top: 1rem; border-top: 1px solid var(--border); }
        .checkout-btn { width: 100%; padding: 1rem; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 2px; }
        .checkout-btn:hover { background: var(--secondary); }
        .checkout-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ===== CHECKOUT ===== */
        .checkout-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 3000; align-items: center; justify-content: center; padding: 2rem; }
        .checkout-modal.active { display: flex; }
        .checkout-form { background: white; border-radius: 16px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 2rem; }
        .checkout-form h2 { margin-bottom: 1.5rem; text-align: center; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 0.9rem; transition: border-color 0.3s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--secondary); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .payment-methods { display: flex; gap: 1rem; margin-bottom: 1rem; }
        .payment-method { flex: 1; padding: 1rem; border: 2px solid var(--border); border-radius: 8px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .payment-method:hover, .payment-method.active { border-color: var(--secondary); background: var(--accent); }
        .order-summary { background: var(--light); padding: 1.5rem; border-radius: 8px; margin: 1.5rem 0; }
        .order-summary h4 { margin-bottom: 1rem; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .summary-total { display: flex; justify-content: space-between; font-weight: 700; font-size: 1.1rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
        .place-order-btn { width: 100%; padding: 1rem; background: var(--success); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .place-order-btn:hover { opacity: 0.9; }

        /* ===== TOAST ===== */
        .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--primary); color: white; padding: 1rem 2rem; border-radius: 8px; box-shadow: var(--shadow-lg); z-index: 4000; transform: translateY(100px); opacity: 0; transition: all 0.3s ease; }
        .toast.show { transform: translateY(0); opacity: 1; }

        /* ===== FOOTER ===== */
        footer { background: var(--dark); color: white; padding: 4rem 2rem 2rem; }
        .footer-content { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 3rem; }
        .footer-section h4 { font-size: 1.1rem; margin-bottom: 1.5rem; color: var(--secondary); }
        .footer-section ul { list-style: none; }
        .footer-section ul li { margin-bottom: 0.8rem; }
        .footer-section ul li a { color: rgba(255,255,255,0.7); text-decoration: none; transition: color 0.3s; }
        .footer-section ul li a:hover { color: var(--secondary); }
        .footer-section p { color: rgba(255,255,255,0.7); line-height: 1.8; }
        .footer-bottom { max-width: 1400px; margin: 3rem auto 0; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1); text-align: center; color: rgba(255,255,255,0.5); font-size: 0.9rem; }

        /* ===== EDITABLE HIGHLIGHTS (Admin Mode) ===== */
        .edit-mode .editable { outline: 2px dashed var(--secondary); position: relative; cursor: pointer; }
        .edit-mode .editable:hover { outline: 2px solid var(--secondary); background: rgba(201,169,110,0.1); }
        .edit-mode .editable::after { content: '✏️ Click to edit'; position: absolute; top: -20px; right: 0; background: var(--secondary); color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; opacity: 0; transition: opacity 0.3s; font-family: 'Inter', sans-serif; }
        .edit-mode .editable:hover::after { opacity: 1; }

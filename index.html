<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELIF Market - Click Product for Details & Payment</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #c9a962; --primary-dark: #b8944f; --secondary: #1a1a2e; --accent: #16213e; --text: #e8e8e8; --text-muted: #a0a0a0; --bg: #0f0f1a; --card-bg: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.1); --success: #4ade80; --danger: #f87171; --warning: #fbbf24; --info: #60a5fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }
        h1, h2, h3, h4, .brand { font-family: 'Playfair Display', serif; }
        header { position: fixed; top: 0; width: 100%; z-index: 1000; background: rgba(15,15,26,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .header-container { max-width: 1400px; margin: 0 auto; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-size: 1.8rem; font-weight: 700; color: var(--primary); text-decoration: none; letter-spacing: 2px; }
        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a { color: var(--text); text-decoration: none; font-weight: 500; transition: color 0.3s; cursor: pointer; }
        .nav-links a:hover { color: var(--primary); }
        .header-actions { display: flex; gap: 1rem; align-items: center; }
        .icon-btn { background: none; border: none; color: var(--text); font-size: 1.2rem; cursor: pointer; position: relative; transition: all 0.3s; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
        .icon-btn:hover { color: var(--primary); background: rgba(255,255,255,0.05); }
        .badge-count { position: absolute; top: -2px; right: -2px; background: var(--primary); color: var(--secondary); font-size: 0.7rem; font-weight: 700; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .user-badge { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 1rem; background: rgba(96,165,250,0.15); border: 1px solid var(--info); border-radius: 20px; color: var(--info); font-size: 0.8rem; font-weight: 600; }
        .admin-badge { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 1rem; background: rgba(201,169,98,0.15); border: 1px solid var(--primary); border-radius: 20px; color: var(--primary); font-size: 0.8rem; font-weight: 600; }
        .btn { display: inline-block; padding: 1rem 2.5rem; background: var(--primary); color: var(--secondary); text-decoration: none; font-weight: 600; border-radius: 8px; transition: all 0.3s; border: 2px solid var(--primary); cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.95rem; }
        .btn:hover { background: transparent; color: var(--primary); transform: translateY(-2px); }
        .btn-outline { background: transparent; color: var(--primary); }
        .btn-outline:hover { background: var(--primary); color: var(--secondary); }
        .btn-danger { background: var(--danger); border-color: var(--danger); color: white; }
        .btn-sm { padding: 0.5rem 1rem; font-size: 0.85rem; }
        .btn-block { width: 100%; }
        .btn-lg { padding: 1.2rem 3rem; font-size: 1.1rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; font-size: 0.85rem; font-weight: 500; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.9rem 1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.95rem; transition: all 0.3s; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .auth-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.88); backdrop-filter: blur(20px); z-index: 99999; display: none; align-items: center; justify-content: center; }
        .auth-modal.active { display: flex; }
        .auth-box { background: var(--secondary); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; width: 90%; max-width: 420px; box-shadow: 0 25px 80px rgba(0,0,0,0.6); }
        .auth-box .brand { font-size: 1.8rem; color: var(--primary); margin-bottom: 0.5rem; text-align: center; display: block; }
        .auth-box .subtitle { text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; }
        .auth-error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--danger); padding: 0.8rem; border-radius: 6px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
        .auth-error.show { display: block; }
        .auth-success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: var(--success); padding: 0.8rem; border-radius: 6px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
        .auth-success.show { display: block; }
        .security-badge { text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.75rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .dropdown-menu { position: fixed; top: 70px; right: 20px; background: var(--secondary); border: 1px solid rgba(201,169,98,0.3); border-radius: 12px; padding: 0.5rem; z-index: 9999; min-width: 220px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); display: none; animation: menuSlide 0.3s ease; }
        .dropdown-menu.active { display: block; }
        @keyframes menuSlide { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .menu-status { text-align: center; padding: 0.5rem; font-size: 0.75rem; color: var(--success); border-bottom: 1px solid var(--border); margin-bottom: 0.5rem; }
        .menu-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem 1rem; color: var(--text); border-radius: 8px; cursor: pointer; transition: all 0.3s; font-family: 'Inter', sans-serif; font-size: 0.9rem; border: none; background: none; width: 100%; text-align: left; text-decoration: none; }
        .menu-item:hover { background: rgba(201,169,98,0.1); color: var(--primary); }
        .menu-item i { width: 20px; text-align: center; color: var(--primary); }
        .menu-divider { height: 1px; background: var(--border); margin: 0.5rem 0; }
        .menu-logout { color: var(--danger) !important; }
        .menu-logout i { color: var(--danger) !important; }
        .menu-logout:hover { background: rgba(248,113,113,0.1) !important; }
        .toast-container { position: fixed; bottom: 2rem; right: 2rem; z-index: 100000; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast { padding: 1rem 1.5rem; border-radius: 8px; color: white; font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.3); animation: toastSlide 0.3s ease; }
        .toast.success { background: var(--success); color: var(--secondary); }
        .toast.error { background: var(--danger); }
        .toast.info { background: var(--info); }
        @keyframes toastSlide { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .products-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2rem; }
        .product-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: all 0.3s; cursor: pointer; }
        .product-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .product-image { position: relative; height: 280px; overflow: hidden; }
        .product-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .product-card:hover .product-image img { transform: scale(1.05); }
        .product-badge { position: absolute; top: 1rem; left: 1rem; padding: 0.3rem 0.8rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .badge-sale { background: var(--danger); color: white; }
        .badge-new { background: var(--success); color: var(--secondary); }
        .badge-hot { background: var(--warning); color: var(--secondary); }
        .product-info { padding: 1.5rem; }
        .product-category { font-size: 0.8rem; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
        .product-name { font-size: 1.1rem; margin-bottom: 0.5rem; font-weight: 600; }
        .product-price { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
        .price-current { font-size: 1.3rem; font-weight: 700; color: var(--primary); }
        .price-original { font-size: 1rem; color: var(--text-muted); text-decoration: line-through; }
        .product-detail { margin-top: 80px; padding: 3rem 2rem; max-width: 1400px; margin-left: auto; margin-right: auto; display: none; }
        .product-detail.active { display: block; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: start; }
        .detail-image { position: relative; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); }
        .detail-image img { width: 100%; height: 500px; object-fit: cover; }
        .detail-info h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        .detail-info .category { color: var(--primary); text-transform: uppercase; letter-spacing: 2px; font-size: 0.85rem; margin-bottom: 1rem; }
        .detail-info .price { font-size: 2rem; font-weight: 700; color: var(--primary); margin-bottom: 0.5rem; }
        .detail-info .price-original { font-size: 1.3rem; color: var(--text-muted); text-decoration: line-through; margin-left: 1rem; }
        .detail-info .description { color: var(--text-muted); line-height: 1.8; margin-bottom: 2rem; font-size: 1rem; }
        .features-list { list-style: none; margin-bottom: 2rem; }
        .features-list li { display: flex; align-items: center; gap: 0.8rem; padding: 0.5rem 0; color: var(--text-muted); }
        .features-list li i { color: var(--success); }
        .stock-status { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); border-radius: 20px; color: var(--success); font-size: 0.85rem; margin-bottom: 2rem; }
        .cart-sidebar { position: fixed; top: 0; right: -450px; width: 450px; height: 100vh; background: var(--secondary); z-index: 2000; transition: right 0.4s ease; border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .cart-sidebar.open { right: 0; }
        .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1999; opacity: 0; visibility: hidden; transition: all 0.3s; }
        .cart-overlay.open { opacity: 1; visibility: visible; }
        .cart-header { padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .cart-items { flex: 1; overflow-y: auto; padding: 1rem; }
        .cart-item { display: flex; gap: 1rem; padding: 1rem; background: var(--card-bg); border-radius: 8px; margin-bottom: 1rem; border: 1px solid var(--border); }
        .cart-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; }
        .cart-item-info { flex: 1; }
        .cart-item-info h4 { font-size: 0.95rem; margin-bottom: 0.3rem; }
        .cart-item-info p { color: var(--primary); font-weight: 600; margin-bottom: 0.5rem; }
        .qty-controls { display: flex; align-items: center; gap: 0.5rem; }
        .qty-btn { width: 28px; height: 28px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .qty-btn:hover { background: var(--primary); color: var(--secondary); }
        .remove-item { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 0.9rem; margin-left: auto; }
        .cart-footer { padding: 1.5rem; border-top: 1px solid var(--border); }
        .cart-total { display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: 700; margin-bottom: 1rem; }
        .cart-total span { color: var(--primary); }
        .checkout-section { margin-top: 80px; padding: 3rem 2rem; max-width: 800px; margin-left: auto; margin-right: auto; display: none; }
        .checkout-section.active { display: block; }
        .checkout-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; }
        .order-summary { background: var(--secondary); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
        .order-item { display: flex; justify-content: space-between; padding: 0.8rem 0; border-bottom: 1px solid var(--border); }
        .order-item:last-child { border-bottom: none; }
        .order-total { display: flex; justify-content: space-between; padding-top: 1rem; border-top: 2px solid var(--primary); margin-top: 1rem; font-size: 1.2rem; font-weight: 700; }
        .auth-page { margin-top: 80px; min-height: 90vh; display: flex; align-items: center; justify-content: center; padding: 2rem; display: none; }
        .auth-page.active { display: flex; }
        .auth-card { background: var(--secondary); border: 1px solid var(--border); border-radius: 16px; padding: 3rem; width: 100%; max-width: 450px; box-shadow: 0 25px 80px rgba(0,0,0,0.5); }
        .auth-card .brand { font-size: 2rem; text-align: center; margin-bottom: 0.5rem; }
        .auth-card .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 2rem; }
        .auth-link { color: var(--primary); text-decoration: none; }
        .auth-link:hover { text-decoration: underline; }
        .admin-panel { margin-top: 80px; padding: 2rem; max-width: 1200px; margin-left: auto; margin-right: auto; display: none; }
        .admin-panel.active { display: block; }
        .admin-tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        .admin-tab-btn { padding: 0.6rem 1.5rem; background: transparent; border: 1px solid var(--border); color: var(--text); border-radius: 30px; cursor: pointer; transition: all 0.3s; font-family: 'Inter', sans-serif; }
        .admin-tab-btn:hover, .admin-tab-btn.active { background: var(--primary); border-color: var(--primary); color: var(--secondary); }
        .admin-content { display: none; }
        .admin-content.active { display: block; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border); }
        .data-table th { color: var(--primary); font-weight: 600; }
        .data-table tr:hover { background: var(--card-bg); }
        .hero-section { margin-top: 80px; min-height: 60vh; display: flex; align-items: center; justify-content: center; text-align: center; background: linear-gradient(135deg, rgba(15,15,26,0.95) 0%, rgba(22,33,62,0.9) 100%), url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1920') center/cover; }
        @media (max-width: 1024px) { .products-grid { grid-template-columns: repeat(2, 1fr); } .detail-grid { grid-template-columns: 1fr; } }
        @media (max-width: 768px) { .products-grid { grid-template-columns: 1fr; } .cart-sidebar { width: 100%; right: -100%; } .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-container">
            <a href="#" class="brand" onclick="showHome(); return false;">ELIF Market</a>
            <nav class="nav-links">
                <a onclick="showHome()">Home</a>
                <a onclick="showHome()">Products</a>
                <a onclick="showContact()">Contact</a>
            </nav>
            <div class="header-actions">
                <div id="userBadge" style="display: none;"></div>
                <button class="icon-btn" onclick="toggleCart()"><i class="fas fa-shopping-bag"></i><span class="badge-count" id="cartCount">0</span></button>
                <button class="icon-btn" id="menuTrigger" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </header>

    <!-- DROPDOWN MENU -->
    <div id="dropdownMenu" class="dropdown-menu">
        <div class="menu-status"><i class="fas fa-shield-alt"></i> Menu Access</div>
        <a href="#" class="menu-item" onclick="showLogin(); return false;"><i class="fas fa-sign-in-alt"></i> Login</a>
        <a href="#" class="menu-item" onclick="showRegister(); return false;"><i class="fas fa-user-plus"></i> Register</a>
        <div class="menu-divider"></div>
        <button class="menu-item" onclick="showPinModal()"><i class="fas fa-cog"></i> Admin Panel</button>
        <button class="menu-item" onclick="showPinModal()"><i class="fas fa-edit"></i> Edit Website</button>
        <div class="menu-divider"></div>
        <button class="menu-item menu-logout" onclick="logoutUser()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>

    <!-- HOME PAGE (Products Grid) -->
    <div id="homePage" style="display: block;">
        <section class="hero-section">
            <div style="max-width: 800px; padding: 2rem;">
                <span style="display: inline-block; padding: 0.5rem 1.5rem; border: 1px solid var(--primary); color: var(--primary); font-size: 0.85rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 1.5rem;">Premium Collection 2026</span>
                <h1 style="font-size: 4rem; margin-bottom: 1rem; line-height: 1.1;">Discover Luxury <span style="color: var(--primary);">& Style</span></h1>
                <p style="font-size: 1.2rem; color: var(--text-muted); margin-bottom: 2rem;">Click any product to view details and purchase</p>
                <button class="btn" onclick="scrollToProducts()">Shop Now</button>
                <button class="btn btn-outline" onclick="scrollToProducts()" style="margin-left: 1rem;">Explore</button>
            </div>
        </section>

        <section id="products" style="padding: 5rem 2rem; max-width: 1400px; margin: 0 auto;">
            <div style="text-align: center; margin-bottom: 3rem;">
                <h2 style="font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 0.5rem;">Featured Products</h2>
                <p style="color: var(--text-muted);">Click any product to view details & payment options</p>
            </div>
            <div style="display: flex; justify-content: center; gap: 1rem; margin-bottom: 3rem; flex-wrap: wrap;">
                <button class="btn btn-sm" onclick="filterProducts('all')" id="btn-all" style="background: var(--primary); color: var(--secondary); border-color: var(--primary);">All</button>
                <button class="btn btn-sm btn-outline" onclick="filterProducts('electronics')" id="btn-electronics" style="margin-left: 0;">Electronics</button>
                <button class="btn btn-sm btn-outline" onclick="filterProducts('fashion')" id="btn-fashion" style="margin

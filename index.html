<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELIF Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #c9a962;
            --primary-dark: #b8944f;
            --secondary: #1a1a2e;
            --accent: #16213e;
            --text: #e8e8e8;
            --text-muted: #a0a0a0;
            --bg: #0f0f1a;
            --card-bg: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.1);
            --success: #4ade80;
            --danger: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }
        h1, h2, h3, h4, .brand { font-family: 'Playfair Display', serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }

        /* Connection Status */
        .connection-status {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 5000;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        .connection-status.online {
            background: rgba(74, 222, 128, 0.15);
            color: var(--success);
            border: 1px solid rgba(74, 222, 128, 0.3);
        }
        .connection-status.offline {
            background: rgba(248, 113, 113, 0.15);
            color: var(--danger);
            border: 1px solid rgba(248, 113, 113, 0.3);
        }
        .connection-status.syncing {
            background: rgba(96, 165, 250, 0.15);
            color: var(--info);
            border: 1px solid rgba(96, 165, 250, 0.3);
            animation: pulse 1.5s infinite;
        }
        .connection-status i {
            font-size: 0.6rem;
        }

        /* Header */
        header { position: fixed; top: 0; width: 100%; z-index: 1000; background: rgba(15, 15, 26, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .header-container { max-width: 1400px; margin: 0 auto; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-size: 1.8rem; font-weight: 700; color: var(--primary); text-decoration: none; letter-spacing: 2px; }
        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a { color: var(--text); text-decoration: none; font-weight: 500; transition: color 0.3s; position: relative; }
        .nav-links a:hover { color: var(--primary); }
        .nav-links a::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background: var(--primary); transition: width 0.3s; }
        .nav-links a:hover::after { width: 100%; }
        .header-actions { display: flex; gap: 1rem; align-items: center; }
        .icon-btn { background: none; border: none; color: var(--text); font-size: 1.2rem; cursor: pointer; position: relative; transition: all 0.3s; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
        .icon-btn:hover { color: var(--primary); background: rgba(255,255,255,0.05); }
        .badge-count { position: absolute; top: -2px; right: -2px; background: var(--primary); color: var(--secondary); font-size: 0.7rem; font-weight: 700; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .badge-count.danger { background: var(--danger); color: white; }

        /* Notification Bell */
        .notification-bell { position: relative; }
        .notification-bell .icon-btn.has-new { animation: bellShake 0.5s ease-in-out; }
        .notification-bell .icon-btn.has-new i { color: var(--success); }
        @keyframes bellShake {
            0%, 100% { transform: rotate(0); }
            10%, 30%, 50%, 70%, 90% { transform: rotate(8deg); }
            20%, 40%, 60%, 80% { transform: rotate(-8deg); }
        }
        .notification-dropdown {
            position: absolute;
            top: calc(100% + 10px);
            right: -100px;
            width: 320px;
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px) scale(0.95);
            transition: all 0.3s ease;
            z-index: 1002;
            overflow: hidden;
        }
        .notification-dropdown.open { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }
        .notification-dropdown::before {
            content: '';
            position: absolute;
            top: -6px;
            right: 118px;
            width: 12px;
            height: 12px;
            background: var(--secondary);
            border-left: 1px solid var(--border);
            border-top: 1px solid var(--border);
            transform: rotate(45deg);
        }
        .notification-header {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .notification-header h4 { font-family: 'Inter', sans-serif; font-size: 0.95rem; color: var(--text); }
        .notification-header .mark-read {
            font-size: 0.8rem;
            color: var(--primary);
            cursor: pointer;
            background: none;
            border: none;
            transition: opacity 0.3s;
        }
        .notification-header .mark-read:hover { opacity: 0.8; }
        .notification-list { max-height: 350px; overflow-y: auto; }
        .notification-item {
            display: flex;
            gap: 0.8rem;
            padding: 0.8rem 1.2rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s;
            align-items: flex-start;
            position: relative;
        }
        .notification-item:hover { background: var(--card-bg); }
        .notification-item.unread { background: rgba(74, 222, 128, 0.05); }
        .notification-item.unread::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 60%;
            background: var(--success);
            border-radius: 0 2px 2px 0;
        }
        .notification-item .notif-img {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
        }
        .notification-item .notif-content { flex: 1; min-width: 0; }
        .notification-item .notif-content h5 {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .notification-item .notif-content p { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.2rem; }
        .notification-item .notif-content .notif-time { font-size: 0.7rem; color: var(--success); }
        .notification-empty { padding: 2rem; text-align: center; color: var(--text-muted); }
        .notification-empty i { font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.5; }
        .notification-footer { padding: 0.8rem 1.2rem; border-top: 1px solid var(--border); text-align: center; }
        .notification-footer a { color: var(--primary); font-size: 0.85rem; text-decoration: none; cursor: pointer; }
        .notification-footer a:hover { text-decoration: underline; }

        /* Hero */
        .hero { margin-top: 80px; min-height: 90vh; display: flex; align-items: center; justify-content: center; text-align: center; background: linear-gradient(135deg, rgba(15,15,26,0.95) 0%, rgba(22,33,62,0.9) 100%), url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1920') center/cover; position: relative; }
        .hero-content { max-width: 800px; padding: 2rem; animation: fadeInUp 1s ease; }
        .hero-label { display: inline-block; padding: 0.5rem 1.5rem; border: 1px solid var(--primary); color: var(--primary); font-size: 0.85rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 1.5rem; }
        .hero h1 { font-size: 4rem; margin-bottom: 1rem; line-height: 1.1; }
        .hero h1 span { color: var(--primary); }
        .hero p { font-size: 1.2rem; color: var(--text-muted); margin-bottom: 2rem; }

        .btn { display: inline-block; padding: 1rem 2.5rem; background: var(--primary); color: var(--secondary); text-decoration: none; font-weight: 600; border-radius: 4px; transition: all 0.3s; border: 2px solid var(--primary); cursor: pointer; }
        .btn:hover { background: transparent; color: var(--primary); transform: translateY(-2px); }
        .btn-outline { background: transparent; color: var(--primary); margin-left: 1rem; }
        .btn-outline:hover { background: var(--primary); color: var(--secondary); }
        .btn-danger { background: var(--danger); border-color: var(--danger); color: white; }
        .btn-sm { padding: 0.5rem 1rem; font-size: 0.85rem; }
        .btn-block { width: 100%; }

        /* Features Bar */
        .features-bar { background: var(--secondary); padding: 2rem; border-bottom: 1px solid var(--border); }
        .features-grid { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 2rem; }
        .feature-item { display: flex; align-items: center; gap: 1rem; padding: 1rem; }
        .feature-item i { font-size: 1.5rem; color: var(--primary); }
        .feature-item h4 { font-family: 'Inter', sans-serif; font-size: 0.95rem; margin-bottom: 0.2rem; }
        .feature-item p { font-size: 0.8rem; color: var(--text-muted); }

        /* Categories */
        .section { padding: 5rem 2rem; max-width: 1400px; margin: 0 auto; }
        .section-header { text-align: center; margin-bottom: 3rem; }
        .section-header h2 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .section-header p { color: var(--text-muted); }
        .categories-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
        .category-card { position: relative; height: 300px; border-radius: 12px; overflow: hidden; cursor: pointer; border: 1px solid var(--border); }
        .category-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .category-card:hover img { transform: scale(1.1); }
        .category-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(15,15,26,0.9) 0%, transparent 60%); display: flex; flex-direction: column; justify-content: flex-end; padding: 2rem; transition: all 0.3s; }
        .category-card:hover .category-overlay { background: linear-gradient(to top, rgba(201,169,98,0.3) 0%, rgba(15,15,26,0.7) 100%); }
        .category-overlay h3 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .category-overlay p { font-size: 0.9rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.5rem; }
        .category-overlay i { opacity: 0; transform: translateX(-10px); transition: all 0.3s; }
        .category-card:hover .category-overlay i { opacity: 1; transform: translateX(0); }

        /* Filter Tabs */
        .filter-tabs { display: flex; justify-content: center; gap: 1rem; margin-bottom: 3rem; flex-wrap: wrap; }
        .filter-tab { padding: 0.6rem 1.5rem; background: transparent; border: 1px solid var(--border); color: var(--text); border-radius: 30px; cursor: pointer; transition: all 0.3s; font-family: 'Inter', sans-serif; }
        .filter-tab:hover, .filter-tab.active { background: var(--primary); border-color: var(--primary); color: var(--secondary); }

        /* Products */
        .products-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2rem; }
        .product-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: all 0.3s; position: relative; }
        .product-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .product-image { position: relative; height: 280px; overflow: hidden; }
        .product-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .product-card:hover .product-image img { transform: scale(1.05); }
        .product-badge { position: absolute; top: 1rem; left: 1rem; padding: 0.3rem 0.8rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .badge-sale { background: var(--danger); color: white; }
        .badge-new { background: var(--success); color: var(--secondary); }
        .badge-hot { background: var(--warning); color: var(--secondary); }
        .wishlist-btn { position: absolute; top: 1rem; right: 1rem; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid var(--border); color: var(--text); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; }
        .wishlist-btn:hover, .wishlist-btn.active { background: var(--danger); color: white; border-color: var(--danger); }
        .product-info { padding: 1.5rem; }
        .product-category { font-size: 0.8rem; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
        .product-name { font-size: 1.1rem; margin-bottom: 0.5rem; font-weight: 600; }
        .product-price { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
        .price-current { font-size: 1.3rem; font-weight: 700; color: var(--primary); }
        .price-original { font-size: 1rem; color: var(--text-muted); text-decoration: line-through; }
        .add-to-cart { width: 100%; padding: 0.8rem; background: var(--primary); color: var(--secondary); border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .add-to-cart:hover { background: var(--primary-dark); transform: translateY(-2px); }

        /* Contact */
        .contact-section { background: var(--secondary); padding: 5rem 2rem; }
        .contact-grid { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: start; }
        .contact-info h2 { font-size: 2.5rem; margin-bottom: 1rem; }
        .contact-info > p { color: var(--text-muted); margin-bottom: 2rem; }
        .contact-item { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1.5rem; }
        .contact-item i { font-size: 1.2rem; color: var(--primary); margin-top: 0.2rem; }
        .contact-item h4 { font-family: 'Inter', sans-serif; font-size: 1rem; margin-bottom: 0.2rem; }
        .contact-item p { color: var(--text-muted); font-size: 0.9rem; }
        .contact-form { background: var(--card-bg); padding: 2.5rem; border-radius: 12px; border: 1px solid var(--border); }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.8rem 1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Inter', sans-serif; transition: all 0.3s; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
        .form-group textarea { min-height: 120px; resize: vertical; }

        /* Footer */
        footer { background: var(--bg); border-top: 1px solid var(--border); padding: 4rem 2rem 2rem; }
        .footer-grid { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 3rem; margin-bottom: 3rem; }
        .footer-brand .brand { margin-bottom: 1rem; display: inline-block; }
        .footer-brand p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.8; }
        .footer-col h4 { font-family: 'Inter', sans-serif; font-size: 1rem; margin-bottom: 1.5rem; color: var(--primary); }
        .footer-col a { display: block; color: var(--text-muted); text-decoration: none; margin-bottom: 0.8rem; font-size: 0.9rem; transition: color 0.3s; }
        .footer-col a:hover { color: var(--primary); }
        .social-links { display: flex; gap: 1rem; margin-top: 1.5rem; }
        .social-links a { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text); transition: all 0.3s; }
        .social-links a:hover { background: var(--primary); color: var(--secondary); border-color: var(--primary); }
        .footer-bottom { max-width: 1400px; margin: 0 auto; padding-top: 2rem; border-top: 1px solid var(--border); text-align: center; color: var(--text-muted); font-size: 0.85rem; }

        /* Cart Sidebar */
        .cart-sidebar { position: fixed; top: 0; right: -450px; width: 450px; height: 100vh; background: var(--secondary); z-index: 2000; transition: right 0.4s ease; border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .cart-sidebar.open { right: 0; }
        .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1999; opacity: 0; visibility: hidden; transition: all 0.3s; }
        .cart-overlay.open { opacity: 1; visibility: visible; }
        .cart-header { padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .cart-header h3 { font-family: 'Inter', sans-serif; font-size: 1.2rem; }
        .cart-items { flex: 1; overflow-y: auto; padding: 1rem; }
        .cart-item { display: flex; gap: 1rem; padding: 1rem; background: var(--card-bg); border-radius: 8px; margin-bottom: 1rem; border: 1px solid var(--border); }
        .cart-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; }
        .cart-item-info { flex: 1; }
        .cart-item-info h4 { font-family: 'Inter', sans-serif; font-size: 0.95rem; margin-bottom: 0.3rem; }
        .cart-item-info p { color: var(--primary); font-weight: 600; margin-bottom: 0.5rem; }
        .qty-controls { display: flex; align-items: center; gap: 0.5rem; }
        .qty-btn { width: 28px; height: 28px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .qty-btn:hover { background: var(--primary); color: var(--secondary); }
        .remove-item { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 0.9rem; }
